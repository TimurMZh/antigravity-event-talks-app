<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Explorer</title>
    
    <!-- Meta tags for SEO -->
    <meta name="description" content="Explore, search, filter, and share Google BigQuery release notes. Stay updated with the latest features, issues, changes, and deprecations.">
    <meta name="author" content="BigQuery Release Explorer">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Background grid decoration -->
    <div class="bg-grid-glow"></div>

    <!-- Header bar -->
    <header class="app-header">
        <div class="header-container">
            <div class="logo-area">
                <div class="bq-logo-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                        <path d="M3 5V19A9 3 0 0 0 21 19V5"></path>
                        <path d="M3 12A9 3 0 0 0 21 12"></path>
                    </svg>
                </div>
                <h1>BigQuery <span class="highlight">Release Notes</span></h1>
            </div>
            
            <div class="header-actions">
                <button id="refresh-btn" class="btn btn-secondary" title="Refresh Release Notes">
                    <svg class="icon spinner-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
                    </svg>
                    <span>Refresh</span>
                </button>
                
                <button id="theme-toggle" class="btn btn-icon" title="Toggle Theme">
                    <svg class="icon sun-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                    </svg>
                    <svg class="icon moon-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Dashboard Stats -->
        <section class="stats-dashboard">
            <div class="stat-card active" id="stat-all" data-filter="all">
                <div class="stat-info">
                    <h3>All Updates</h3>
                    <div class="stat-value" id="count-all">-</div>
                </div>
                <div class="stat-icon-bg all-bg">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </div>
            </div>
            
            <div class="stat-card" id="stat-features" data-filter="Feature">
                <div class="stat-info">
                    <h3>Features</h3>
                    <div class="stat-value text-emerald" id="count-features">-</div>
                </div>
                <div class="stat-icon-bg features-bg">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                </div>
            </div>
            
            <div class="stat-card" id="stat-issues" data-filter="Issue">
                <div class="stat-info">
                    <h3>Issues / Fixes</h3>
                    <div class="stat-value text-rose" id="count-issues">-</div>
                </div>
                <div class="stat-icon-bg issues-bg">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3Z"></path>
                    </svg>
                </div>
            </div>
            
            <div class="stat-card" id="stat-other" data-filter="Other">
                <div class="stat-info">
                    <h3>Others</h3>
                    <div class="stat-value text-purple" id="count-other">-</div>
                </div>
                <div class="stat-icon-bg other-bg">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 16v-4M12 8h.01"></path>
                    </svg>
                </div>
            </div>
        </section>

        <!-- Search and Filters Control Bar -->
        <section class="control-bar">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search release notes by keyword, code, or date...">
                <button id="search-clear-btn" class="search-clear" style="display: none;">&times;</button>
            </div>
            
            <div class="filter-controls">
                <div class="pill-group" id="type-pills">
                    <button class="pill active" data-type="all">All Types</button>
                    <button class="pill" data-type="Feature">Features</button>
                    <button class="pill" data-type="Issue">Issues</button>
                    <button class="pill" data-type="Changed">Changed</button>
                    <button class="pill" data-type="Deprecated">Deprecated</button>
                </div>
                
                <div class="sort-wrapper">
                    <label for="sort-select">Sort:</label>
                    <select id="sort-select" class="custom-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Feed Area -->
        <section class="feed-section">
            <div class="feed-header">
                <div class="feed-title">
                    <h2 id="feed-results-title">All Release Notes</h2>
                    <span id="feed-results-subtitle" class="text-secondary">Loading...</span>
                </div>
                <div id="cache-time" class="cache-time text-secondary"></div>
            </div>

            <!-- Timeline element -->
            <div class="timeline-container">
                <div class="timeline-line"></div>
                <div id="release-notes-feed" class="release-notes-list">
                    <!-- Skeleton loaders -->
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Floating Action Bar for Selected Items (Tweets) -->
    <div id="floating-actions" class="floating-actions-bar">
        <div class="floating-content">
            <span id="selected-count">0 items selected</span>
            <div class="floating-buttons">
                <button id="clear-selected-btn" class="btn btn-text">Clear</button>
                <button id="tweet-selected-btn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" class="x-icon">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                    </svg>
                    <span>Tweet Combined Summary</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Tweet Dialog Modal -->
    <div id="tweet-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Compose Tweet</h2>
                <button class="modal-close" id="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="tweet-composer-container">
                    <textarea id="tweet-text" rows="8" placeholder="What would you like to tweet?"></textarea>
                    <div class="tweet-info-row">
                        <span id="char-counter" class="char-counter">0 / 280</span>
                        <span id="char-warning" class="char-warning" style="display: none;">Exceeds X limit (280 chars)</span>
                    </div>
                </div>
                <div class="tweet-preview-header">Preview format:</div>
                <div class="tweet-preview-box" id="tweet-preview-rendered">
                </div>
            </div>
            <div class="modal-footer">
                <button id="copy-tweet-btn" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span>Copy Text</span>
                </button>
                <button id="send-tweet-btn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" class="x-icon">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                    </svg>
                    <span>Post to X / Twitter</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <span id="toast-message">Message copied!</span>
    </div>

    <!-- App JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
